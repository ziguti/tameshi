<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山科歴史デジタルアーカイブ - GeoJSONデータベース</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* モーダルのスタイル */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 9999; 
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fff;
            margin: 10% auto; 
            padding: 20px;
            border-radius: 8px;
            width: 85%;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
            max-height: 75vh;
            overflow-y: auto;
        }
        .close-btn {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
            line-height: 1;
        }
        .close-btn:hover {
            color: #000;
        }
        .modal-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .modal-table th, .modal-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        .modal-table th {
            background-color: #f4f4f4;
            width: 30%;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h3 style="margin-top: 0; border-bottom: 2px solid #3388ff; padding-bottom: 8px;">属性情報</h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ★ここにダウンロードしたGeoJSONの中身（{ "type": "FeatureCollection", ... }）を丸ごと貼り付けます
        const geojsonData = {
            "type": "FeatureCollection",
            "features": [
                // 【重要】ここに features の中身をすべて貼り付けてください。
                // これにより、外部通信を一切行わずにスタンドアロンで動作します。
            ]
        };

        // 地図の初期化（初期位置は京都山科付近に仮設定、データ読込後に自動ジャンプします）
        const map = L.map('map').setView([34.98, 135.81], 14);

        // 背景レイヤー（地理院地図 標準地図）
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
            attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>国土地理院</a>"
        }).addTo(map);

        const modal = document.getElementById("infoModal");
        const modalBody = document.getElementById("modalBody");
        const closeModal = document.getElementById("closeModal");

        // モーダルを閉じる
        closeModal.onclick = function() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

        // GeoJSONレイヤーの生成とイベント設定
        const geojsonLayer = L.geoJSON(geojsonData, {
            style: function (feature) {
                return {
                    color: "#3388ff",
                    weight: 2,
                    opacity: 0.8,
                    fillColor: "#3388ff",
                    fillOpacity: 0.2
                };
            },
            onEachFeature: function (feature, layer) {
                layer.on('click', function (e) {
                    let properties = feature.properties;
                    let tableHtml = '<table class="modal-table">';
                    
                    for (let key in properties) {
                        if (properties.hasOwnProperty(key)) {
                            let value = properties[key];
                            tableHtml += `<tr><th>${key}</th><td>${value !== null ? value : ''}</td></tr>`;
                        }
                    }
                    tableHtml += '</table>';
                    
                    modalBody.innerHTML = tableHtml;
                    modal.style.display = "block";

                    // クリックされたポリゴンのスタイルを強調
                    geojsonLayer.resetStyle();
                    layer.setStyle({
                        weight: 3,
                        color: '#ff3300',
                        fillOpacity: 0.4
                    });
                });
            }
        }).addTo(map);

        // ポリゴンが存在する位置へ地図の表示範囲を自動調整
        if (geojsonLayer.getBounds().isValid()) {
            map.fitBounds(geojsonLayer.getBounds());
        }
    </script>
</body>
</html>

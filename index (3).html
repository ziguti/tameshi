<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet GeoJSON Modal Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* カスタムモーダルのスタイル */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 9999; 
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fff;
            margin: 15% auto; 
            padding: 20px;
            border-radius: 8px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            position: relative;
        }
        .close-btn {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }
        .close-btn:hover {
            color: #000;
        }
        .modal-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .modal-table th, .modal-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .modal-table th {
            background-color: #f4f4f4;
            width: 35%;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h3>属性情報</h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <script href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 地図の初期化（初期位置は日本全体が見えるように設定、GeoJSON読込後に自動調整）
        const map = L.map('map').setView([35.0, 135.0], 5);

        // 背景レイヤー（地理院地図）の追加
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
            attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>国土地理院</a>"
        }).addTo(map);

        // モーダル要素の取得
        const modal = document.getElementById("infoModal");
        const modalBody = document.getElementById("modalBody");
        const closeModal = document.getElementById("closeModal");

        // モーダルを閉じる処理
        closeModal.onclick = function() {
            modal.style.display = "none";
        }
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // GeoJSONデータのURL
        const geojsonUrl = 'https://drive.google.com/uc?export=download&id=14Hn37XO3xFgoOZQ1_6rviVMt1nFF3M4i';

        // GeoJSONの読み込みと配置
        fetch(geojsonUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                const geojsonLayer = L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            color: "#3388ff",
                            weight: 2,
                            opacity: 0.8,
                            fillColor: "#3388ff",
                            fillOpacity: 0.2
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        // ポリゴンクリック時のイベント
                        layer.on('click', function (e) {
                            // 属性情報を元にテーブルHTMLを作成
                            let properties = feature.properties;
                            let tableHtml = '<table class="modal-table">';
                            
                            for (let key in properties) {
                                if (properties.hasOwnProperty(key)) {
                                    tableHtml += `<tr><th>${key}</th><td>${properties[key] !== null ? properties[key] : ''}</td></tr>`;
                                }
                            }
                            tableHtml += '</table>';
                            
                            // モーダルに注入して表示
                            modalBody.innerHTML = tableHtml;
                            modal.style.display = "block";

                            // クリックした要素を目立たせる（任意）
                            geojsonLayer.resetStyle();
                            layer.setStyle({
                                weight: 3,
                                color: '#ff3300',
                                fillOpacity: 0.4
                            });
                            
                            // 地図の自動移動を防ぎたい場合は e.target.stopPropagation() 等を入れる
                        });
                    }
                }).addTo(map);

                // 全てのポリゴンが収まるように地図の表示範囲を自動調整
                if (geojsonLayer.getBounds().isValid()) {
                    map.fitBounds(geojsonLayer.getBounds());
                }
            })
            .catch(error => {
                console.error('Error loading the GeoJSON data:', error);
                alert('GeoJSONデータの読み込みに失敗しました。CORSポリシーまたはURLを確認してください。');
            });
    </script>
</body>
</html>
